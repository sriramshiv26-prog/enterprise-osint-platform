# Alembic Configuration File

[alembic]
# path to migration scripts
sqlalchemy.url = postgresql://osint_user:osint_password@localhost/osint_platform

# use the environment for migrations
sqlalchemy.echo = true
script_location = alembic
logfile = alembic.log
log_level = INFO

# Version locations
version_locations = %(here)s/alembic/versions

# Version Path Template
version_path_separator = /

# Logging configuration
[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
